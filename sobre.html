<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECT TEA - Sobre</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #F5F7FA;
            color: #1A2C3E;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(42, 111, 151, 0.15);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            font-size: 1.8rem;
        }

        .logo-text {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1A2C3E;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #5B6E8C;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: #2A6F97;
        }

        .user-avatar-small {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2A6F97, #1E4A6B);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .config-layout {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .sidebar {
            width: 220px;
            background: white;
            border-radius: 0.75rem;
            padding: 1rem;
            border: 1px solid #E2E8F0;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .sidebar-menu a {
            padding: 0.75rem 1rem;
            text-decoration: none;
            color: #5B6E8C;
            border-radius: 0.5rem;
            transition: 0.2s;
        }

        .sidebar-menu a:hover {
            background: #F1F5F9;
            color: #2A6F97;
        }

        .sidebar-menu a.active {
            background: #E6F4F9;
            color: #2A6F97;
            font-weight: 500;
        }

        .content {
            flex: 1;
            background: white;
            border-radius: 0.75rem;
            padding: 1.5rem;
            border: 1px solid #E2E8F0;
            text-align: center;
        }

        .sobre-logo {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .content h1 {
            font-size: 1.8rem;
            margin-bottom: 0.25rem;
        }

        .versao {
            color: #94A3B8;
            margin-bottom: 1.5rem;
        }

        .sobre-descricao {
            background: #E6F4F9;
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .sobre-descricao p {
            color: #2A6F97;
            font-weight: 500;
        }

        .sobre-acoes {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .acao-btn {
            padding: 0.6rem 1.2rem;
            background: #F1F5F9;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .acao-btn:hover {
            background: #2A6F97;
            color: white;
        }

        .sobre-footer {
            padding-top: 1rem;
            border-top: 1px solid #EDF2F7;
        }

        .sobre-footer p {
            color: #5B6E8C;
            font-size: 0.8rem;
        }

        .copyright {
            margin-top: 0.5rem;
            font-size: 0.7rem;
            color: #94A3B8;
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 1rem;
            }
            .sidebar {
                width: 100%;
            }
            .sidebar-menu {
                flex-direction: row;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="navbar">
            <div class="logo">
                <span class="logo-icon">🧩</span>
                <span class="logo-text">CONECT TEA</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Início</a>
                <a href="assistente.html">Chat</a>
                <a href="biblioteca.html">Biblioteca</a>
                <a href="configuracoes.html">Configurações</a>
            </div>
            <div class="user-avatar-small" id="navAvatar">JV</div>
        </nav>

        <div class="config-layout">
            <div class="sidebar">
                <div class="sidebar-menu">
                    <a href="perfil.html">Perfil</a>
                    <a href="notificacoes.html">Notificações</a>
                    <a href="sobre.html" class="active">Sobre</a>
                    <a href="ferramentas.html">Ferramentas</a>
                </div>
            </div>

            <div class="content">
                <div class="sobre-logo">🧩</div>
                <h1>CONECT TEA</h1>
                <p class="versao">v1.0.0</p>

                <div class="sobre-descricao">
                    <p>Plataforma desenvolvida para apoiar pessoas com TEA.</p>
                </div>

                <div class="sobre-acoes">
                    <button class="acao-btn" id="avaliarBtn">Avaliar o site</button>
                    <button class="acao-btn" id="contatoBtn">Contato e suporte</button>
                    <button class="acao-btn" id="redesBtn">Redes Sociais</button>
                </div>

                <div class="sobre-footer">
                    <p>Feito com amor para a comunidade TEA</p>
                    <p class="copyright">© 2026 CONECT TEA - Todos os direitos reservados</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const userData = JSON.parse(localStorage.getItem("userData") || "{}");
        const nome = userData.nome || "Usuário";
        const iniciais = nome.split(" ").map(n => n[0]).join("").slice(0, 2).toUpperCase();
        document.getElementById("navAvatar").innerText = iniciais;

        document.getElementById("avaliarBtn").addEventListener("click", () => {
            alert("⭐ Obrigado por avaliar o CONECT TEA!");
        });

        document.getElementById("contatoBtn").addEventListener("click", () => {
            alert("📧 Contato: suporte@conecttea.com\n\nWhatsApp: (51) 99999-9999");
        });

        document.getElementById("redesBtn").addEventListener("click", () => {
            alert("🌐 Instagram: @conecttea\n📘 Facebook: /conecttea");
        });
    </script>
</body>
</html>
