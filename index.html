<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONECT TEA - Início</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #2A6F97 0%, #1E4A6B 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .splash {
      text-align: center;
      color: white;
      animation: fadeIn 1s ease;
    }
    .splash h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    .splash p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      opacity: 0.9;
    }
    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="loader"></div>
    <h1>🧩 CONECT TEA</h1>
    <p>Carregando...</p>
  </div>
  <script>
    setTimeout(() => {
      window.location.href = "biblioteca.html";
    }, 1500);
  </script>
</body>
</html>
