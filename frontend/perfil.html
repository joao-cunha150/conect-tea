<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECT TEA - Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #F5F7FA;
            color: #1A2C3E;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(42, 111, 151, 0.15);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            font-size: 1.8rem;
        }

        .logo-text {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1A2C3E;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #5B6E8C;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: #2A6F97;
        }

        .user-avatar-small {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2A6F97, #1E4A6B);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .config-layout {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .sidebar {
            width: 220px;
            background: white;
            border-radius: 0.75rem;
            padding: 1rem;
            border: 1px solid #E2E8F0;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .sidebar-menu a {
            padding: 0.75rem 1rem;
            text-decoration: none;
            color: #5B6E8C;
            border-radius: 0.5rem;
            transition: 0.2s;
        }

        .sidebar-menu a:hover {
            background: #F1F5F9;
            color: #2A6F97;
        }

        .sidebar-menu a.active {
            background: #E6F4F9;
            color: #2A6F97;
            font-weight: 500;
        }

        .content {
            flex: 1;
            background: white;
            border-radius: 0.75rem;
            padding: 1.5rem;
            border: 1px solid #E2E8F0;
        }

        .content h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .content > p {
            color: #5B6E8C;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #E2E8F0;
        }

        .perfil-avatar {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }

        .avatar-grande {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #2A6F97, #1E4A6B);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 0.75rem;
        }

        .btn-alterar-foto {
            background: none;
            border: 1px solid #CBD5E1;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .perfil-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .form-group label {
            font-weight: 500;
            font-size: 0.85rem;
            color: #334155;
        }

        .form-group input,
        .form-group textarea {
            padding: 0.7rem;
            border: 1px solid #E2E8F0;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-salvar {
            margin-top: 1rem;
            padding: 0.8rem;
            background: #2A6F97;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 1rem;
            }
            .sidebar {
                width: 100%;
            }
            .sidebar-menu {
                flex-direction: row;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="navbar">
            <div class="logo">
                <span class="logo-icon">🧩</span>
                <span class="logo-text">CONECT TEA</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Início</a>
                <a href="assistente.html">Chat</a>
                <a href="biblioteca.html">Biblioteca</a>
                <a href="configuracoes.html">Configurações</a>
            </div>
            <div class="user-avatar-small" id="navAvatar">JV</div>
        </nav>

        <div class="config-layout">
            <div class="sidebar">
                <div class="sidebar-menu">
                    <a href="perfil.html" class="active">Perfil</a>
                    <a href="notificacoes.html">Notificações</a>
                    <a href="sobre.html">Sobre</a>
                    <a href="ferramentas.html">Ferramentas</a>
                </div>
            </div>

            <div class="content">
                <h1>Perfil</h1>
                <p>Gerencie suas informações pessoais</p>

                <div class="perfil-avatar">
                    <div class="avatar-grande" id="avatarGrande">JV</div>
                    <button class="btn-alterar-foto" id="alterarFotoBtn">Alterar foto</button>
                    <input type="file" id="uploadFoto" accept="image/*" style="display: none;">
                </div>

                <form id="perfilForm" class="perfil-form">
                    <div class="form-group">
                        <label>Nome completo</label>
                        <input type="text" id="nomeCompleto" value="João Victor da Cunha Rosa">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" value="dacunharosajoaovictor@gmail.com">
                    </div>
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="tel" id="telefone" value="(51) 99999-9999">
                    </div>
                    <div class="form-group">
                        <label>Data de Nascimento</label>
                        <input type="date" id="dataNascimento" value="2008-05-16">
                    </div>
                    <div class="form-group">
                        <label>Bio</label>
                        <textarea id="bio">Apaixonado por conectar pessoas, boas conversas e um bom chá</textarea>
                    </div>
                    <button type="submit" class="btn-salvar">Salvar alterações</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Carregar dados salvos
        let userData = JSON.parse(localStorage.getItem("userData") || "{}");
        
        if (userData.nome) document.getElementById("nomeCompleto").value = userData.nome;
        if (userData.email) document.getElementById("email").value = userData.email;
        if (userData.telefone) document.getElementById("telefone").value = userData.telefone;
        if (userData.dataNascimento) document.getElementById("dataNascimento").value = userData.dataNascimento;
        if (userData.bio) document.getElementById("bio").value = userData.bio;

        function atualizarAvatar() {
            const nome = document.getElementById("nomeCompleto").value;
            const iniciais = nome.split(" ").map(n => n[0]).join("").slice(0, 2).toUpperCase();
            document.getElementById("avatarGrande").innerText = iniciais;
            document.getElementById("navAvatar").innerText = iniciais;
        }
        atualizarAvatar();

        document.getElementById("nomeCompleto").addEventListener("input", atualizarAvatar);

        // Upload de foto
        document.getElementById("alterarFotoBtn").addEventListener("click", () => {
            document.getElementById("uploadFoto").click();
        });

        document.getElementById("uploadFoto").addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    localStorage.setItem("userFoto", event.target.result);
                    alert("✅ Foto atualizada!");
                };
                reader.readAsDataURL(file);
            }
        });

        // Salvar perfil
        document.getElementById("perfilForm").addEventListener("submit", (e) => {
            e.preventDefault();
            const userData = {
                nome: document.getElementById("nomeCompleto").value,
                email: document.getElementById("email").value,
                telefone: document.getElementById("telefone").value,
                dataNascimento: document.getElementById("dataNascimento").value,
                bio: document.getElementById("bio").value
            };
            localStorage.setItem("userData", JSON.stringify(userData));
            atualizarAvatar();
            alert("✅ Perfil atualizado com sucesso!");
        });
    </script>
</body>
</html>
